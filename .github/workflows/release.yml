name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0 — no leading 'v'). Written to gradle.properties and tagged as 'v<version>'."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            # tag looks like v1.2.0 -> strip leading 'v'
            version="${GITHUB_REF_NAME#v}"
          fi
          # sanity check: digits and dots only
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$'; then
            echo "::error::Invalid version '$version'. Expected something like 1.2.0 (optionally with a pre-release/build suffix)."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version (tag v$version)"

      - name: Bump mod_version in gradle.properties
        run: |
          version="${{ steps.ver.outputs.version }}"
          if ! grep -q '^mod_version=' gradle.properties; then
            echo "::error::mod_version key not found in gradle.properties"
            exit 1
          fi
          sed -i "s/^mod_version=.*/mod_version=$version/" gradle.properties
          echo "Updated gradle.properties:"
          grep '^mod_version=' gradle.properties

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Prepare release assets
        run: |
          version="${{ steps.ver.outputs.version }}"
          mkdir -p release-assets
          cp "build/libs/randomchaos-${version}.jar" release-assets/
          cp "build/libs/randomchaos-${version}-sources.jar" release-assets/
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/randomchaos-${{ steps.ver.outputs.version }}.jar
            release-assets/randomchaos-${{ steps.ver.outputs.version }}-sources.jar
